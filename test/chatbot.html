<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Jit Realty Chatbot</title>

<style>
body { font-family: Arial; background:#0f172a; color:#fff; margin:0; }
.container { max-width:900px; margin:auto; padding:20px; }
.chat { height:70vh; overflow:auto; background:#020617; padding:10px; border-radius:10px; }
.msg { padding:10px; margin:6px 0; border-radius:8px; word-wrap: break-word; line-height: 1.4; }
.user { background:#06b6d4; color:#000; text-align:right; }
.bot { background:#1e293b; }
.input { display:flex; margin-top:10px; }
input { flex:1; padding:10px; border-radius:8px; border:none; }
button { padding:10px; margin-left:5px; border:none; background:#06b6d4; border-radius:8px; cursor: pointer; font-weight: bold; }
button:hover { background:#0891b2; }
.error { background:#ef4444; color:#fff; }
.settings-link { color:#06b6d4; text-decoration: underline; cursor: pointer; }
</style>
</head>

<body>
<div class="container">
<h2>Jit Realty (Vancouver)</h2>

<div id="chat" class="chat"></div>

<div class="input">
<input id="input" placeholder="Ask about properties..." onkeypress="if(event.key==='Enter')send()" />
<button onclick="send()">Send</button>
</div>
</div>

<script>
const OPENROUTER_API_KEY = "sk-or-v1-...";

const SYSTEM_PROMPT = `You are a real estate assistant for Jit in Vancouver.
- Keep replies short (1-2 sentences)
- Be professional and friendly  
- Suggest properties when relevant
- Try to convert user into a lead
- Offer viewing appointments or contact info`;

const chat = document.getElementById("chat");

function addMsg(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMsg(text, "user");
  input.value = "";

  const thinkingMsg = addMsg("Thinking...", "bot");

  try {
    // Using FASTEST free model: llama-3.2-3b-instruct (only 3B parameters)
    // Fallback options if this fails:
    // - "google/gemma-3-4b-it:free" (4B params, very fast)
    // - "mistralai/mistral-7b-instruct:free" (7B params, good balance)
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + OPENROUTER_API_KEY,
        "Content-Type": "application/json",
        "HTTP-Referer": window.location.href,
        "X-Title": "Jit Realty Chatbot"
      },
      body: JSON.stringify({
        model: "stepfun/step-3.5-flash:free",
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          { role: "user", content: text }
        ],
        temperature: 0.7,
        max_tokens: 150
      })
    });

    const data = await res.json();
    console.log("API Response:", data);

    if (!res.ok) {
      if (data.error?.message?.includes("guardrail") || data.error?.message?.includes("data policy")) {
        thinkingMsg.innerHTML = "⚠️ Privacy Error: Go to <span class='settings-link' onclick=\"window.open('https://openrouter.ai/settings/privacy','_blank')\">OpenRouter Privacy Settings</span> → Enable 'Model Training' → Save. Then refresh this page.";
        thinkingMsg.className += " error";
        return;
      }
      throw new Error(`API Error ${res.status}: ${data.error?.message || 'Unknown error'}`);
    }

    if (data?.choices?.[0]?.message?.content) {
      thinkingMsg.innerText = data.choices[0].message.content.trim();
    } else {
      thinkingMsg.innerText = "No response received";
    }

  } catch (err) {
    console.error("Error:", err);
    thinkingMsg.innerText = "Error: " + err.message;
    thinkingMsg.className += " error";
  }
}

// Welcome message
window.onload = () => {
  addMsg("Hi! I'm Jit's real estate assistant. Looking to buy or sell in Vancouver?", "bot");
};
</script>
</body>
</html>
